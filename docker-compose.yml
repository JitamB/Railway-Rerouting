# CascadeGuard — full-stack skeleton. Service images are stubs; this wires the topology.
# Validate with:  docker compose config
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: cascadeguard
      POSTGRES_PASSWORD: cascadeguard
      POSTGRES_DB: cascadeguard
    ports:
      - "5432:5432"
    volumes:
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    build: ./services/api
    env_file: .env
    depends_on:
      - redis
      - timescaledb
      - helpline
    ports:
      - "8000:8000"

  worker:
    build: ./services/worker
    env_file: .env
    depends_on:
      - redis
      - timescaledb

  helpline:
    build: ./services/helpline
    env_file: .env
    depends_on:
      - timescaledb
    ports:
      - "8100:8100"

  # The passenger app is native (Expo / React Native) — not a containerized web service.
  # Run it with `cd frontend/passenger-app && npx expo start` (Expo Go / EAS build).
  # It talks to the `api` service over REST + expo-notifications push.

  operator-dashboard:
    build: ./frontend/operator-dashboard
    depends_on:
      - api
    ports:
      - "3001:3001"
