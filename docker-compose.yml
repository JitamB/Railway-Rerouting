# CascadeGuard — full-stack skeleton. Service images are stubs; this wires the topology.
# Validate with:  docker compose config
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: cascadeguard
      POSTGRES_PASSWORD: cascadeguard
      POSTGRES_DB: cascadeguard
    ports:
      - "5432:5432"
    volumes:
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    build: ./services/api
    env_file: .env
    depends_on:
      - redis
      - timescaledb
    ports:
      - "8000:8000"

  worker:
    build: ./services/worker
    env_file: .env
    depends_on:
      - redis
      - timescaledb

  passenger-pwa:
    build: ./frontend/passenger-pwa
    depends_on:
      - api
    ports:
      - "3000:3000"

  operator-dashboard:
    build: ./frontend/operator-dashboard
    depends_on:
      - api
    ports:
      - "3001:3001"
